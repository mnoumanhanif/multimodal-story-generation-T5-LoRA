# Default configuration for the multimodal story generation pipeline.
#
# Copy this file and adjust values as needed for your environment.

# Device to use for inference and training ("cuda" or "cpu").
device: auto

# Language models to load for story generation.
llm_models:
  flan-t5-base: google/flan-t5-base
  flan-t5-small: google/flan-t5-small
  t5-small: t5-small

# LoRA fine-tuning hyper-parameters.
lora:
  r: 8
  alpha: 32
  dropout: 0.05
  target_modules:
    - q
    - v

# Training hyper-parameters.
training:
  num_epochs: 3
  learning_rate: 2.0e-4
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  logging_steps: 5
  save_steps: 50
  eval_steps: 20
  fp16: true

# Dataset settings.
dataset:
  name: nlphuji/flickr30k
  split: "test[:10]"
  test_size: 0.2
  max_input_len: 128
  max_target_len: 64
